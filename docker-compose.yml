services:
  db:
    image: mysql:8.0
    container_name: mgp_mysql
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: multi_gateway_payments
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    build: .
    container_name: mgp_api
    depends_on:
      - db
      - gateways-mock
    environment:
      NODE_ENV: development
      DB_CONNECTION: mysql
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: secret
      MYSQL_DB_NAME: multi_gateway_payments
      HOST: 0.0.0.0
      PORT: 3333
      APP_KEY: minha-app-key-32-chars-long-secret
      APP_NAME: multi-gateway-payment-manager
      GATEWAY1_BASE_URL: http://gateways-mock:3001
      GATEWAY2_BASE_URL: http://gateways-mock:3002
    ports:
      - "3333:3333"
    volumes:
      - .:/usr/src/app
      - app_node_modules:/usr/src/app/node_modules
    working_dir: /usr/src/app
    command: ["sh", "-c", "npm install --legacy-peer-deps && node ace serve --watch"]

  gateways-mock:
    image: matheusprotzen/gateways-mock
    container_name: mgp_gateways_mock
    ports:
      - "3001:3001"
      - "3002:3002"

volumes:
  db_data:
  app_node_modules:
